<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birim Çevirici | MH Platform</title>
<link rel="stylesheet" href="mh-tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}

/* ─── NAV ─── */
nav{position:relative;z-index:10;flex-shrink:0;
  background:rgba(7,7,14,0.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;height:52px;gap:20px}
.brand{font-family:var(--font-logo);font-size:var(--fz-18);letter-spacing:3px;
  color:var(--orange);text-decoration:none}
.brand em{color:var(--text);font-style:normal}
.breadcrumb{font-size:var(--fz-12);color:#8080a8;font-family:var(--font-m);
  display:flex;align-items:center;gap:8px}
.breadcrumb span{color:#52527a}

/* ─── APP SHELL ─── */
.app{position:relative;z-index:1;display:flex;flex:1;overflow:hidden;
  --cc:#60a5fa}

/* ─── LEFT: Category sidebar ─── */
.cat-col{background:var(--bg2);border-right:1px solid var(--border);
  width:220px;flex-shrink:0;display:flex;flex-direction:column;
  overflow-y:auto;padding-bottom:20px}
.col-label{font-family:var(--font-h);font-size:var(--fz-11);letter-spacing:2px;
  color:#9090c0;text-transform:uppercase;padding:14px 14px 8px;flex-shrink:0}
.col-section{font-family:var(--font-h);font-size:var(--fz-10);letter-spacing:2px;
  color:#52527a;text-transform:uppercase;padding:10px 14px 5px;
  border-top:1px solid var(--border);margin-top:4px}
.col-section:first-of-type{border-top:none;margin-top:0}
.cat-btn{display:flex;align-items:center;gap:10px;width:100%;
  padding:8px 14px;background:transparent;border:none;
  border-left:3px solid transparent;
  color:#8080a8;font-family:var(--font-b);font-size:var(--fz-13);
  cursor:pointer;text-align:left;transition:all .15s;white-space:nowrap}
.cat-btn:hover{background:var(--surf1);color:var(--text)}
.cat-btn.active{background:var(--surf1);color:var(--text);
  font-weight:500;border-left-color:var(--cc)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  opacity:.55;transition:opacity .15s}
.cat-btn.active .cat-dot{opacity:1}
.cat-icon-sm{font-size:13px;width:18px;text-align:center;flex-shrink:0}

/* ─── CENTER: Converter ─── */
.conv-col{width:480px;max-width:480px;flex-shrink:0;display:flex;
  flex-direction:column;overflow-y:auto;padding:14px 16px;gap:12px}

/* Category header */
.cat-header{display:flex;align-items:center;gap:14px;
  padding:12px 14px;background:var(--surf1);
  border:1px solid var(--border);border-radius:10px;
  border-top:3px solid var(--cc);transition:border-top-color .2s}
.cat-icon-big{font-size:22px;line-height:1;flex-shrink:0}
.cat-title-txt{font-family:var(--font-h);font-size:var(--fz-20);
  font-weight:700;color:var(--text);line-height:1.1}
.cat-subtitle-txt{font-size:var(--fz-11);color:#8080a8;margin-top:3px}

/* Main converter card */
.conv-card{background:var(--surf1);border:1px solid var(--border);
  border-radius:10px;padding:20px 16px;display:flex;flex-direction:column;gap:14px}

.field-lbl{font-family:var(--font-h);font-size:var(--fz-10);
  letter-spacing:2px;color:#52527a;text-transform:uppercase;margin-bottom:6px}

/* Input + select row */
.conv-row{display:flex;gap:8px;align-items:stretch}
.inp-wrap{flex:1;display:flex;background:var(--surf2);
  border:1px solid var(--border);border-radius:8px;
  overflow:hidden;transition:border-color .2s}
.inp-wrap:focus-within{border-color:var(--cc)}
.conv-inp{flex:1;padding:12px 16px;background:transparent;border:none;
  color:var(--text);font-family:var(--font-m);font-size:var(--fz-22);
  font-weight:600;outline:none;min-width:0;
  -webkit-appearance:none; -moz-appearance:textfield; appearance:none;}
.conv-inp::placeholder{color:#444468}

/* Unit select */
.sel-wrap{position:relative;flex-shrink:0}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;
  transform:translateY(-50%);color:#52527a;pointer-events:none;
  font-size:10px;line-height:1}
.unit-sel{min-width:118px;height:100%;padding:0 28px 0 12px;
  background:var(--surf3);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-h);font-size:var(--fz-14);
  font-weight:700;letter-spacing:.5px;cursor:pointer;outline:none;
  appearance:none;transition:background .15s, border-color .15s;
  border-radius:8px}
.unit-sel:focus{background:#232345;border-color:var(--cc)}
.unit-sel option{background:#17172a;font-family:monospace;font-size:13px}

/* Swap row */
.swap-row{display:flex;align-items:center;gap:10px;padding:2px 0}
.div-line{flex:1;height:1px;background:var(--border)}
.swap-btn{display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;background:var(--surf2);
  border:1px solid var(--border);border-radius:8px;
  color:#8080a8;font-size:18px;cursor:pointer;
  transition:all .2s;user-select:none}
.swap-btn:hover{border-color:var(--cc);color:var(--cc);background:var(--surf3);
  transform:rotate(180deg)}

/* Formula strip */
.formula-strip{display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:rgba(0,0,0,.2);
  border-radius:8px;border:1px solid var(--border)}
.fmla-txt{font-family:var(--font-m);font-size:var(--fz-12);
  color:#8080a8;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.fmla-accent{color:var(--cc)}
.copy-btn{padding:4px 10px;background:transparent;
  border:1px solid var(--border);border-radius:5px;
  color:#52527a;font-family:var(--font-m);font-size:var(--fz-10);
  cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap}
.copy-btn:hover{border-color:var(--cc);color:var(--cc)}
.copy-btn.ok{color:var(--green);border-color:var(--green)}

/* Tips box */
.tips-box{border-left:3px solid var(--cc);border-radius:0 8px 8px 0;
  background:rgba(0,0,0,.15);
  padding:10px 14px;transition:border-left-color .2s}
.tips-txt{font-size:var(--fz-11);color:#8080a8;line-height:1.7;font-family:var(--font-b)}
.tips-txt strong{color:#9090c0;font-weight:600}

/* ─── SPACER ─── */
.flex-space{flex:1;min-width:0}

/* ─── RIGHT: Cascade panel ─── */
.casc-col{background:var(--bg2);border-left:1px solid var(--border);
  width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.casc-head{padding:11px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.casc-title{font-family:var(--font-h);font-size:var(--fz-14);
  font-weight:700;letter-spacing:1px}
.casc-sub{font-family:var(--font-m);font-size:var(--fz-11);
  color:var(--cc);text-align:right;transition:color .2s}
.casc-list{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:2px}

/* Cascade items */
.c-item{display:flex;align-items:center;gap:8px;
  padding:7px 10px 7px 12px;
  border-radius:6px;border-left:3px solid transparent;
  cursor:pointer;transition:background .12s;user-select:none}
.c-item:hover{background:var(--surf1)}
.c-item.c-from{border-left-color:var(--cc);background:rgba(255,255,255,.025)}
.c-item.c-to{border-left-color:#00d4aa;background:rgba(0,212,170,.03)}

.c-lbl{font-family:var(--font-m);font-size:var(--fz-12);font-weight:600;
  min-width:58px;flex-shrink:0;color:#8080a8;transition:color .15s}
.c-item.c-from .c-lbl{color:var(--cc)}
.c-item.c-to .c-lbl{color:#00d4aa}

.c-name{font-size:var(--fz-10);color:#52527a;font-family:var(--font-b);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-val{font-family:var(--font-m);font-size:var(--fz-12);font-weight:600;
  color:var(--text);text-align:right;flex-shrink:0;
  max-width:105px;overflow:hidden;white-space:nowrap}
.c-item.c-from .c-val{color:var(--cc)}
.c-item.c-to .c-val{color:#00d4aa}

.c-flash{animation:cfls .4s ease forwards}
@keyframes cfls{
  0%{background:rgba(74,222,128,.15)}
  100%{background:transparent}
}

/* Section divider in cascade */
.c-section{font-family:var(--font-h);font-size:var(--fz-9);
  letter-spacing:2px;color:#444468;text-transform:uppercase;
  padding:8px 10px 3px;margin-top:4px}

/* Scrollbar tweaks */
.casc-list::-webkit-scrollbar,.conv-col::-webkit-scrollbar,.cat-col::-webkit-scrollbar{width:4px}
.casc-list::-webkit-scrollbar-track,.conv-col::-webkit-scrollbar-track,.cat-col::-webkit-scrollbar-track{background:transparent}
.casc-list::-webkit-scrollbar-thumb,.conv-col::-webkit-scrollbar-thumb,.cat-col::-webkit-scrollbar-thumb{background:#1e1e34;border-radius:2px}
@media (max-width: 768px) {
  .cat-col {
    display: flex !important;
    flex-wrap: nowrap !important;
    flex-direction: row !important;
    width: 100% !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    border-right: none !important;
    border-bottom: 1px solid var(--border) !important;
    padding: 0 !important;
    flex-shrink: 0 !important;
    scrollbar-width: none;
  }
  .cat-col::-webkit-scrollbar { display: none; }
  .col-label, .col-section { display: none !important; }
  .cat-btn {
    flex-direction: column !important;
    align-items: center !important;
    padding: 10px 12px !important;
    border-left: none !important;
    border-bottom: 3px solid transparent !important;
    white-space: nowrap !important;
    min-width: max-content !important;
    font-size: 11px !important;
    gap: 3px !important;
  }
  .cat-btn.active {
    border-left-color: transparent !important;
    border-bottom-color: var(--cc) !important;
  }
  .conv-col {
    width: 100% !important;
    max-width: 100% !important;
  }
  .casc-col {
    width: 100% !important;
    border-left: none !important;
    border-top: 1px solid var(--border) !important;
    max-height: 40vh;
  }
  /* Birim select genişlik sorunu */
  .conv-row { flex-wrap: wrap !important; gap: 6px !important; }
  .sel-wrap { width: 100% !important; }
  .unit-sel { width: 100% !important; min-width: unset !important; height: 44px !important; }
  .flex-space { display: none !important; }
}
</style>
</head>
<body>

<nav>
  <a class="brand" href="index.html">MH<em>Platform</em></a>
  <div class="breadcrumb">
    <a href="index.html" style="color:var(--dim2);text-decoration:none">Ana Sayfa</a>
    <span class="sep">/</span>
    <span id="navCrumb" style="color:var(--text)">Birim Çevirici</span>
  </div>
</nav>
<div class="app" id="app">

  <!-- LEFT: Category sidebar -->
  <div class="cat-col" id="catCol"></div>

  <!-- CENTER: Main converter -->
  <div class="conv-col">

    <div class="cat-header" id="catHdr">
      <div class="cat-icon-big" id="catIcon">📏</div>
      <div>
        <div class="cat-title-txt" id="catTitle">Uzunluk</div>
        <div class="cat-subtitle-txt" id="catSub">—</div>
      </div>
    </div>

    <div class="conv-card">
      <!-- FROM field -->
      <div>
        <div class="field-lbl">Giriş</div>
        <div class="conv-row">
          <div class="inp-wrap">
            <input class="conv-inp" id="fromInp" type="text"
              inputmode="decimal" value="1" autocomplete="off"
              placeholder="değer girin">
          </div>
          <div class="sel-wrap">
            <select class="unit-sel" id="fromSel"></select>
          </div>
        </div>
      </div>

      <!-- Swap -->
      <div class="swap-row">
        <div class="div-line"></div>
        <button class="swap-btn" id="swapBtn" title="Birimleri Ters Çevir">⇅</button>
        <div class="div-line"></div>
      </div>

      <!-- TO field -->
      <div>
        <div class="field-lbl">Sonuç</div>
        <div class="conv-row">
          <div class="inp-wrap">
            <input class="conv-inp" id="toInp" type="text"
              inputmode="decimal" autocomplete="off"
              placeholder="—">
          </div>
          <div class="sel-wrap">
            <select class="unit-sel" id="toSel"></select>
          </div>
        </div>
      </div>

      <!-- Formula -->
      <div class="formula-strip">
        <div class="fmla-txt" id="fmlaTxt">—</div>
        <button class="copy-btn" id="copyBtn">Kopyala</button>
      </div>
    </div>

    <!-- Engineering tip -->
    <div class="tips-box" id="tipsBox">
      <div class="tips-txt" id="tipsTxt"></div>
    </div>

  </div><!-- /conv-col -->


  <!-- RIGHT: All-units cascade -->
  <div class="casc-col">
    <div class="casc-head">
      <div class="casc-title">Tüm Birimler</div>
      <div class="casc-sub" id="cascSub">—</div>
    </div>
    <div class="casc-list" id="cascList"></div>
  </div>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════════════════════
//  VERİ — 13 kategori, mühendislik odaklı birim seçimi
// ═══════════════════════════════════════════════════════════════════
const π = Math.PI;

const CATS = [

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let CAT    = CATS[0];
let FROM   = CAT.dF;
let TO     = CAT.dT;
let FVAL   = 1;   // current from-value (canonical)

// ═══════════════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════════════
const $app      = document.getElementById('app');
const $catCol   = document.getElementById('catCol');
const $catHdr   = document.getElementById('catHdr');
const $catIcon  = document.getElementById('catIcon');
const $catTitle = document.getElementById('catTitle');
const $catSub   = document.getElementById('catSub');
const $fromInp  = document.getElementById('fromInp');
const $toInp    = document.getElementById('toInp');
const $fromSel  = document.getElementById('fromSel');
const $toSel    = document.getElementById('toSel');
const $swapBtn  = document.getElementById('swapBtn');
const $fmlaTxt  = document.getElementById('fmlaTxt');
const $copyBtn  = document.getElementById('copyBtn');
const $cascList = document.getElementById('cascList');
const $cascSub  = document.getElementById('cascSub');
const $tipsTxt  = document.getElementById('tipsTxt');
const $tipsBox  = document.getElementById('tipsBox');
const $navCrumb = document.getElementById('navCrumb');

// ═══════════════════════════════════════════════════════════════════
//  CONVERSION MATH
// ═══════════════════════════════════════════════════════════════════

// Temperature: all conversions go through Kelvin as base
function toK(v, uid){
  switch(uid){
    case 'C': return v + 273.15;
    case 'F': return (v + 459.67) * 5/9;
    case 'K': return v;
    case 'R': return v * 5/9;
  }
  return NaN;
}
function fromK(K, uid){
  switch(uid){
    case 'C': return K - 273.15;
    case 'F': return K * 9/5 - 459.67;
    case 'K': return K;
    case 'R': return K * 9/5;
  }
  return NaN;
}

function conv(val, fromId, toId){
  if (fromId === toId) return val;
  if (CAT.type === 'temp') return fromK(toK(val, fromId), toId);
  const fu = CAT.units.find(u => u.id === fromId);
  const tu = CAT.units.find(u => u.id === toId);
  if (!fu || !tu) return NaN;
  return (val * fu.f) / tu.f;
}

// ═══════════════════════════════════════════════════════════════════
//  NUMBER FORMATTING
// ═══════════════════════════════════════════════════════════════════

function fmtInp(n){
  if (!isFinite(n) || isNaN(n)) return '';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e-6 && abs < 1e12)
    return parseFloat(n.toPrecision(10)).toString();
  return n.toExponential(6);
}

function fmtDisp(n, sig=6){
  if (!isFinite(n) || isNaN(n)) return '—';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 0.001 && abs < 1e8)
    return parseFloat(n.toPrecision(sig)).toString();
  return n.toExponential(3);
}

function fmtFactor(n){
  if (!isFinite(n) || isNaN(n)) return '—';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 0.0001 && abs < 1e9)
    return parseFloat(n.toPrecision(8)).toString();
  return n.toExponential(5);
}

// ═══════════════════════════════════════════════════════════════════
//  UI — DROPDOWNS
// ═══════════════════════════════════════════════════════════════════

function buildDropdown(sel, cat, activeId){
  sel.innerHTML = '';
  cat.units.forEach(u => {
    const o = document.createElement('option');
    o.value = u.id;
    o.textContent = u.lb;
    if (u.id === activeId) o.selected = true;
    sel.appendChild(o);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  UI — FORMULA STRIP
// ═══════════════════════════════════════════════════════════════════

const TEMP_FORMULAS = {
  'C-F':'°F = °C × 9/5 + 32',
  'F-C':'°C = (°F − 32) × 5/9',
  'C-K':'K = °C + 273,15',
  'K-C':'°C = K − 273,15',
  'C-R':'°R = (°C + 273,15) × 9/5',
  'R-C':'°C = °R × 5/9 − 273,15',
  'F-K':'K = (°F + 459,67) × 5/9',
  'K-F':'°F = K × 9/5 − 459,67',
  'F-R':'°R = °F + 459,67',
  'R-F':'°F = °R − 459,67',
  'K-R':'°R = K × 9/5',
  'R-K':'K = °R × 5/9',
};

function updateFormula(){
  const fu = CAT.units.find(u => u.id === FROM);
  const tu = CAT.units.find(u => u.id === TO);
  if (!fu || !tu){ $fmlaTxt.innerHTML='—'; return; }

  let html = '';
  if (CAT.type === 'temp'){
    const f = TEMP_FORMULAS[`${FROM}-${TO}`] || `${fu.lb} → ${tu.lb}`;
    html = `<span style="color:#52527a">Formül: </span><span class="fmla-accent">${f}</span>`;
  } else {
    const factor = conv(1, FROM, TO);
    html = `1 <span class="fmla-accent">${fu.lb}</span>&thinsp;=&thinsp;<span class="fmla-accent">${fmtFactor(factor)}</span>&thinsp;<span class="fmla-accent">${tu.lb}</span>`;
  }
  $fmlaTxt.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
//  UI — CASCADE
// ═══════════════════════════════════════════════════════════════════

function updateCascade(){
  $cascList.innerHTML = '';
  const fu = CAT.units.find(u => u.id === FROM);
  $cascSub.textContent = `${fmtDisp(FVAL, 5)} ${fu ? fu.lb : ''}`;

  CAT.units.forEach(u => {
    const val = conv(FVAL, FROM, u.id);
    const isF = (u.id === FROM);
    const isT = (u.id === TO);

    const div = document.createElement('div');
    div.className = `c-item${isF?' c-from':''}${isT?' c-to':''}`;
    div.title = `${u.nm} — tıkla kopyala`;
    div.innerHTML = `
      <div class="c-lbl">${u.lb}</div>
      <div class="c-name">${u.nm}</div>
      <div class="c-val">${isNaN(val) ? '—' : fmtDisp(val, 5)}</div>
    `;
    div.addEventListener('click', () => {
      if (!isNaN(val)){
        navigator.clipboard.writeText(fmtDisp(val, 8)).catch(()=>{});
        div.classList.add('c-flash');
        setTimeout(()=> div.classList.remove('c-flash'), 500);
      }
    });
    $cascList.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  CALCULATE
// ═══════════════════════════════════════════════════════════════════

function calc(side){
  if (side === 'from'){
    const v = parseFloat($fromInp.value);
    if (!isNaN(v)){
      FVAL = v;
      const r = conv(v, FROM, TO);
      $toInp.value = fmtInp(r);
    } else {
      $toInp.value = '';
    }
  } else {
    const v = parseFloat($toInp.value);
    if (!isNaN(v)){
      const r = conv(v, TO, FROM);
      FVAL = r;
      $fromInp.value = fmtInp(r);
    } else {
      $fromInp.value = '';
    }
  }
  updateFormula();
  updateCascade();
}

// ═══════════════════════════════════════════════════════════════════
//  SWITCH CATEGORY
// ═══════════════════════════════════════════════════════════════════

function switchCat(cat){
  CAT   = cat;
  FROM  = cat.dF;
  TO    = cat.dT;
  FVAL  = 1;

  // Color
  $app.style.setProperty('--cc', cat.color);
  $cascSub.style.color = cat.color;

  // Header
  $catIcon.textContent    = cat.icon;
  $catTitle.textContent   = cat.lbl;
  $catSub.textContent     = cat.desc;
  $catHdr.style.borderTopColor = cat.color;

  // Tips
  $tipsTxt.innerHTML         = cat.tip || '';
  $tipsBox.style.borderLeftColor = cat.color;

  // Nav breadcrumb
  $navCrumb.textContent = `Birim Çevirici — ${cat.lbl}`;
  document.title = `${cat.lbl} | Birim Çevirici — MH Platform`;

  // Dropdowns
  buildDropdown($fromSel, cat, FROM);
  buildDropdown($toSel,   cat, TO);

  // Input
  $fromInp.value = '1';
  $toInp.value   = '';

  // Active button
  $catCol.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === cat.id);
  });

  calc('from');
}

// ═══════════════════════════════════════════════════════════════════
//  BUILD SIDEBAR
// ═══════════════════════════════════════════════════════════════════

function buildSidebar(){
  let currentSec = null;

  CATS.forEach(cat => {
    // Insert section label when section changes
    if (cat.sec !== currentSec){
      currentSec = cat.sec;
      const sec = document.createElement('div');
      sec.className = 'col-section';
      sec.textContent = cat.sec;
      $catCol.appendChild(sec);
    }

    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.id = cat.id;
    btn.style.setProperty('--cc', cat.color);
    btn.innerHTML = `
      <span class="cat-dot" style="background:${cat.color}"></span>
      <span class="cat-icon-sm">${cat.icon}</span>
      <span>${cat.lbl}</span>
    `;
    btn.addEventListener('click', () => switchCat(cat));
    $catCol.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════

$fromInp.addEventListener('input', () => calc('from'));
$toInp.addEventListener('input',   () => calc('to'));

$fromSel.addEventListener('change', () => {
  FROM = $fromSel.value;
  calc('from');
});
$toSel.addEventListener('change', () => {
  TO = $toSel.value;
  calc('from');
});

$swapBtn.addEventListener('click', () => {
  const prevFrom = FROM;
  const prevTo   = TO;
  const prevToVal = parseFloat($toInp.value);

  FROM = prevTo;
  TO   = prevFrom;
  $fromSel.value = FROM;
  $toSel.value   = TO;

  if (!isNaN(prevToVal)){
    $fromInp.value = fmtInp(prevToVal);
    FVAL = prevToVal;
  }
  calc('from');
});

$copyBtn.addEventListener('click', () => {
  const v = $toInp.value;
  if (!v) return;
  navigator.clipboard.writeText(v).then(() => {
    $copyBtn.textContent = '✓ Kopyalandı';
    $copyBtn.classList.add('ok');
    setTimeout(() => {
      $copyBtn.textContent = 'Kopyala';
      $copyBtn.classList.remove('ok');
    }, 1500);
  }).catch(()=>{});
});

// Allow only valid numeric characters in text inputs
function sanitizeNumInput(inp){
  inp.addEventListener('keydown', e => {
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab',
                     'Home','End','-','.','e','E','+'];
    if (allowed.includes(e.key)) return;
    if (e.key >= '0' && e.key <= '9') return;
    e.preventDefault();
  });
}
sanitizeNumInput($fromInp);
sanitizeNumInput($toInp);

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
buildSidebar();
switchCat(CATS[0]);
</script>
